name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── 1. Run Supabase migrations & deploy Edge Functions ─────────────────────
  deploy-supabase:
    name: Supabase — Migrations & Edge Functions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Mark pre-existing migrations as applied
        # These 3 migrations were applied directly in Supabase dashboard before CI was set up.
        # Marking them applied prevents CI from re-running them on an already-configured DB.
        # New migrations added in future will NOT be listed here and will run normally.
        run: |
          supabase migration repair --status applied 20251220140002 || true
          supabase migration repair --status applied 20251223112025 || true
          supabase migration repair --status applied 20251225205851 || true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push new database migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: supabase functions deploy --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── 2. Build frontend & trigger Render deploy ──────────────────────────────
  deploy-frontend:
    name: Frontend — Build & Deploy to Render
    runs-on: ubuntu-latest
    needs: deploy-supabase
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Trigger Render deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --fail \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        shell: bash
